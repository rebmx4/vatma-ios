workflows:
  ios-app-store:
    name: ATMA iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: ATMA
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ru.atma.app
      vars:
        XCODE_SCHEME: "ATMA"
        BUNDLE_ID: "ru.atma.app"
    scripts:
      - name: Install XcodeGen
        script: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$CM_BUILD_DIR"
          xcodegen generate
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ATMA.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - rerebmx@gmail.com
        notify:
          success: true
          failure: true
