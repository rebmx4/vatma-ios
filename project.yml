name: ATMA

options:
  bundleIdPrefix: ru.atma
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: ru
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: ru

targets:
  ATMA:
    type: application
    platform: iOS
    sources:
      - path: ATMA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.atma.app
        PRODUCT_NAME: ATMA
        INFOPLIST_FILE: ATMA/Info.plist
        CODE_SIGN_ENTITLEMENTS: ATMA/Entitlements/Entitlements.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
